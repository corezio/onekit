syntax = "proto3";

package test.sse;

option go_package = "github.com/1homsi/onekit/internal/httpgen/testdata/generated;generated";

import "onekit/http/annotations.proto";

service SSEService {
  option (onekit.http.service_config) = {
    base_path: "/api/v1"
  };

  // Standard unary RPC (should be unaffected)
  rpc GetStatus(GetStatusRequest) returns (StatusResponse) {
    option (onekit.http.config) = {
      path: "/status"
      method: HTTP_METHOD_GET
    };
  }

  // SSE streaming RPC
  rpc StreamEvents(StreamEventsRequest) returns (Event) {
    option (onekit.http.config) = {
      path: "/events"
      method: HTTP_METHOD_GET
      stream: true
    };
  }

  // SSE with path params
  rpc StreamResourceEvents(StreamResourceEventsRequest) returns (ResourceEvent) {
    option (onekit.http.config) = {
      path: "/resources/{resource_id}/events"
      method: HTTP_METHOD_GET
      stream: true
    };
  }

  // SSE with query params
  rpc StreamFilteredEvents(StreamFilteredEventsRequest) returns (Event) {
    option (onekit.http.config) = {
      path: "/events/filtered"
      method: HTTP_METHOD_GET
      stream: true
    };
  }
}

message GetStatusRequest {}

message StatusResponse {
  string status = 1;
  int64 uptime_seconds = 2;
}

message StreamEventsRequest {}

message Event {
  string id = 1;
  string type = 2;
  string payload = 3;
  int64 timestamp = 4;
}

message StreamResourceEventsRequest {
  string resource_id = 1;
}

message ResourceEvent {
  string resource_id = 1;
  string event_type = 2;
  string data = 3;
}

message StreamFilteredEventsRequest {
  string event_type = 1 [(onekit.http.query) = { name: "type" }];
  int32 limit = 2 [(onekit.http.query) = { name: "limit" }];
}
