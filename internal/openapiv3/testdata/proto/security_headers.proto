syntax = "proto3";

package security;

import "onekit/http/annotations.proto";
import "onekit/http/headers.proto";

option go_package = "github.com/1homsi/onekit/internal/openapiv3/testdata/security;security";

// Request message
message SecureRequest {
  // Request data
  string data = 1;
}

// Response message
message SecureResponse {
  // Response data
  string result = 1;
}

// Service with an API-key auth header plus a plain header.
// The auth header becomes a securityScheme; the plain header stays a parameter.
service ApiKeyService {
  option (onekit.http.service_config) = {
    base_path: "/secure"
  };

  option (onekit.http.service_headers) = {
    required_headers: [
      {
        name: "X-API-Key"
        description: "API authentication key"
        type: "string"
        required: true
        format: "uuid"
        auth_type: AUTH_TYPE_API_KEY
      },
      {
        name: "X-Client-Version"
        description: "Client version identifier"
        type: "string"
        required: false
      }
    ]
  };

  // Method inheriting the service-level API key scheme
  rpc GetResource(SecureRequest) returns (SecureResponse) {
    option (onekit.http.config) = {
      path: "/resource"
      method: HTTP_METHOD_GET
    };
  }
}

// Service using bearer token auth with a custom scheme name and jwt format.
service BearerService {
  option (onekit.http.service_config) = {
    base_path: "/bearer"
  };

  option (onekit.http.service_headers) = {
    required_headers: [
      {
        name: "Authorization"
        description: "Bearer access token"
        type: "string"
        required: true
        format: "jwt"
        auth_type: AUTH_TYPE_BEARER
        auth_scheme_name: "AccessToken"
      }
    ]
  };

  // Method protected by the bearer scheme
  rpc CreateResource(SecureRequest) returns (SecureResponse) {
    option (onekit.http.config) = {
      path: "/resource"
      method: HTTP_METHOD_POST
    };
  }
}

// Service combining basic auth (service level) with a method-level API key.
service MixedAuthService {
  option (onekit.http.service_config) = {
    base_path: "/mixed"
  };

  option (onekit.http.service_headers) = {
    required_headers: [
      {
        name: "Authorization"
        description: "Basic credentials"
        type: "string"
        required: true
        auth_type: AUTH_TYPE_BASIC
      }
    ]
  };

  // Method adding an extra API-key requirement on top of basic auth
  rpc DeleteResource(SecureRequest) returns (SecureResponse) {
    option (onekit.http.config) = {
      path: "/resource"
      method: HTTP_METHOD_DELETE
    };
    option (onekit.http.method_headers) = {
      required_headers: [
        {
          name: "X-Admin-Token"
          description: "Admin API token"
          type: "string"
          required: true
          auth_type: AUTH_TYPE_API_KEY
        }
      ]
    };
  }
}
