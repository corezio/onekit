syntax = "proto3";

package headers;

import "onekit/http/annotations.proto";
import "onekit/http/headers.proto";

option go_package = "github.com/1homsi/onekit/internal/openapiv3/testdata/headers;headers";

// Simple request message
message HeaderRequest {
  // Request data
  string data = 1;
}

// Simple response message  
message HeaderResponse {
  // Response data
  string result = 1;
}

// Service with comprehensive header testing
service HeaderService {
  option (onekit.http.service_config) = {
    base_path: "/api/v1"
  };
  
  // Service-level headers that apply to all methods
  option (onekit.http.service_headers) = {
    required_headers: [
      {
        name: "X-API-Key"
        description: "API authentication key"
        type: "string"
        required: true
        format: "uuid"
        example: "123e4567-e89b-12d3-a456-426614174000"
      },
      {
        name: "X-Client-Version"
        description: "Client version identifier"
        type: "string"
        required: false
        example: "1.2.3"
      }
    ]
  };
  
  // Method with no additional headers (only service headers)
  rpc ServiceHeadersOnly(HeaderRequest) returns (HeaderResponse) {
    option (onekit.http.config) = {
      path: "/service-headers"
    };
  }
  
  // Method with additional method-specific headers
  rpc WithMethodHeaders(HeaderRequest) returns (HeaderResponse) {
    option (onekit.http.config) = {
      path: "/method-headers"
    };
    option (onekit.http.method_headers) = {
      required_headers: [
        {
          name: "X-Request-ID"
          description: "Unique request identifier for tracing"
          type: "string"
          required: true
          format: "uuid"
        },
        {
          name: "X-Correlation-ID"
          description: "Correlation ID for request tracking"
          type: "string"
          required: false
        }
      ]
    };
  }
  
  // Method that overrides a service header
  rpc OverrideServiceHeader(HeaderRequest) returns (HeaderResponse) {
    option (onekit.http.config) = {
      path: "/override-header"
    };
    option (onekit.http.method_headers) = {
      required_headers: [
        {
          name: "X-API-Key"
          description: "Override: Special API key for this method"
          type: "string"
          required: true
          format: "uuid"
          example: "override-uuid-example"
        }
      ]
    };
  }
}

// Service testing different header types
service HeaderTypesService {
  option (onekit.http.service_config) = {
    base_path: "/types"
  };
  
  // Service with various header types
  option (onekit.http.service_headers) = {
    required_headers: [
      {
        name: "X-String-Header"
        description: "String header"
        type: "string"
        required: true
      },
      {
        name: "X-Integer-Header"
        description: "Integer header"
        type: "integer"
        required: true
      },
      {
        name: "X-Number-Header" 
        description: "Number header"
        type: "number"
        required: false
      },
      {
        name: "X-Boolean-Header"
        description: "Boolean header"
        type: "boolean"
        required: false
      },
      {
        name: "X-Array-Header"
        description: "Array header"
        type: "array"
        required: false
      }
    ]
  };
  
  // Test different header formats
  rpc TestHeaderFormats(HeaderRequest) returns (HeaderResponse) {
    option (onekit.http.config) = {
      path: "/formats"
    };
    option (onekit.http.method_headers) = {
      required_headers: [
        {
          name: "X-UUID-Header"
          type: "string"
          format: "uuid"
          required: true
        },
        {
          name: "X-Email-Header"
          type: "string"  
          format: "email"
          required: false
        },
        {
          name: "X-DateTime-Header"
          type: "string"
          format: "date-time"
          required: false
        },
        {
          name: "X-Date-Header"
          type: "string"
          format: "date"
          required: false
        },
        {
          name: "X-Time-Header"
          type: "string"
          format: "time"
          required: false
        }
      ]
    };
  }
}

// Service with no headers for testing edge case
service NoHeaderService {
  option (onekit.http.service_config) = {
    base_path: "/no-headers"
  };
  
  // Method with no headers
  rpc NoHeaders(HeaderRequest) returns (HeaderResponse) {
    option (onekit.http.config) = {
      path: "/simple"
    };
  }
}

// Service testing deprecated headers
service DeprecatedHeaderService {
  option (onekit.http.service_config) = {
    base_path: "/deprecated"  
  };
  
  option (onekit.http.service_headers) = {
    required_headers: [
      {
        name: "X-Legacy-Header"
        description: "Legacy header that is deprecated"
        type: "string"
        required: false
        deprecated: true
        example: "legacy-value"
      }
    ]
  };
  
  // Method with deprecated header
  rpc WithDeprecatedHeader(HeaderRequest) returns (HeaderResponse) {
    option (onekit.http.config) = {
      path: "/legacy"
    };
  }
}

// Service testing edge cases for headers
service EdgeCaseService {
  option (onekit.http.service_config) = {
    base_path: "/edge-headers"  
  };
  
  // Method with complex header combinations
  rpc ComplexHeaders(HeaderRequest) returns (HeaderResponse) {
    option (onekit.http.config) = {
      path: "/complex"
    };
    option (onekit.http.method_headers) = {
      required_headers: [
        {
          name: "X-Complex-Array"
          description: "Array header with complex format"
          type: "array"
          required: true
        },
        {
          name: "X-Edge-Case"
          description: "Edge case header"
          type: "string"
          required: false
          format: "uuid"
        }
      ]
    };
  }
}