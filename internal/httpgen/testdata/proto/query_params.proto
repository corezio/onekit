// Test proto file for query parameter variations
syntax = "proto3";

package test.httpgen.query;

option go_package = "github.com/1homsi/onekit/internal/httpgen/testdata/generated;generated";

import "onekit/http/annotations.proto";

// QueryParamService tests various query parameter configurations
service QueryParamService {
  option (onekit.http.service_config) = {
    base_path: "/api"
  };

  // All scalar types as query params
  rpc SearchWithTypes(SearchWithTypesRequest) returns (SearchResponse) {
    option (onekit.http.config) = {
      path: "/search/typed"
      method: HTTP_METHOD_GET
    };
  }

  // Required vs optional query params
  rpc SearchRequired(SearchRequiredRequest) returns (SearchResponse) {
    option (onekit.http.config) = {
      path: "/search/required"
      method: HTTP_METHOD_GET
    };
  }

  // Custom query param names
  rpc SearchCustomNames(SearchCustomNamesRequest) returns (SearchResponse) {
    option (onekit.http.config) = {
      path: "/search/custom"
      method: HTTP_METHOD_GET
    };
  }

  // Mixed path and query params
  rpc GetWithFilters(GetWithFiltersRequest) returns (SearchResponse) {
    option (onekit.http.config) = {
      path: "/resources/{resource_id}/items"
      method: HTTP_METHOD_GET
    };
  }

  // Advanced search with enum + repeated params
  rpc SearchAdvanced(SearchAdvancedRequest) returns (SearchResponse) {
    option (onekit.http.config) = {
      path: "/search/advanced"
      method: HTTP_METHOD_GET
    };
  }

  // Enum as path parameter
  rpc GetByRegion(GetByRegionRequest) returns (SearchResponse) {
    option (onekit.http.config) = {
      path: "/regions/{region}"
      method: HTTP_METHOD_GET
    };
  }

  // RPC with empty request message
  rpc GetDefaults(EmptyRequest) returns (SearchResponse) {
    option (onekit.http.config) = {
      path: "/defaults"
      method: HTTP_METHOD_GET
    };
  }
}

message SearchWithTypesRequest {
  // Different scalar types as query params
  string query = 1 [(onekit.http.query) = { name: "q" }];
  int32 limit = 2 [(onekit.http.query) = { name: "limit" }];
  int64 offset = 3 [(onekit.http.query) = { name: "offset" }];
  bool active = 4 [(onekit.http.query) = { name: "active" }];
  float min_score = 5 [(onekit.http.query) = { name: "min_score" }];
  double max_score = 6 [(onekit.http.query) = { name: "max_score" }];
  uint32 page = 7 [(onekit.http.query) = { name: "page" }];
  uint64 timestamp = 8 [(onekit.http.query) = { name: "ts" }];
}

message SearchRequiredRequest {
  // Required query param
  string query = 1 [(onekit.http.query) = { name: "q", required: true }];
  // Optional query params
  int32 page = 2 [(onekit.http.query) = { name: "page" }];
  int32 page_size = 3 [(onekit.http.query) = { name: "page_size" }];
}

message SearchCustomNamesRequest {
  // Field name differs from query param name
  string search_term = 1 [(onekit.http.query) = { name: "q" }];
  int32 results_per_page = 2 [(onekit.http.query) = { name: "limit" }];
  int32 page_number = 3 [(onekit.http.query) = { name: "page" }];
  string sort_field = 4 [(onekit.http.query) = { name: "sort" }];
  bool descending_order = 5 [(onekit.http.query) = { name: "desc" }];
}

message GetWithFiltersRequest {
  // Path parameter
  string resource_id = 1;
  // Query parameters
  string filter = 2 [(onekit.http.query) = { name: "filter" }];
  int32 limit = 3 [(onekit.http.query) = { name: "limit" }];
}

enum Region {
  REGION_UNSPECIFIED = 0 [(onekit.http.enum_value) = "unspecified"];
  REGION_AMERICAS = 1 [(onekit.http.enum_value) = "americas"];
  REGION_EUROPE = 2 [(onekit.http.enum_value) = "europe"];
  REGION_ASIA = 3 [(onekit.http.enum_value) = "asia"];
}

message SearchAdvancedRequest {
  // Enum query param (bugs #1 and #2)
  Region region = 1 [(onekit.http.query) = { name: "region" }];
  // Repeated string query param (issue #161)
  repeated string countries = 2 [(onekit.http.query) = { name: "countries" }];
  // Normal string for baseline
  string keyword = 3 [(onekit.http.query) = { name: "keyword" }];
  // Repeated int32 query param (issue #161 scope audit)
  repeated int32 years = 4 [(onekit.http.query) = { name: "years" }];
  // Repeated bool query param (issue #161 scope audit)
  repeated bool flags = 5 [(onekit.http.query) = { name: "flags" }];
  // Repeated enum query param
  repeated Region regions = 6 [(onekit.http.query) = { name: "regions" }];
}

message GetByRegionRequest {
  // Enum as path parameter
  Region region = 1;
  // Query parameter alongside enum path param
  string keyword = 2 [(onekit.http.query) = { name: "keyword" }];
}

// Empty request message (bug #6)
message EmptyRequest {}

message SearchResponse {
  repeated string results = 1;
  int32 total = 2;
}
