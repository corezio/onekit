// Test proto: Bar with int64_encoding=NUMBER defined in a separate file.
// Used by TestCrossFileInt64EncodingUnwrap to reproduce the cross-file int64 bypass bug.
syntax = "proto3";

package test.httpgen.crossint64;

option go_package = "github.com/1homsi/onekit/internal/httpgen/testdata/generated/crossint64;crossint64";

import "onekit/http/annotations.proto";

// Bar lives in this file. Its volume field has int64_encoding=NUMBER,
// so the encoding generator will emit a custom MarshalJSON for it.
message Bar {
  string symbol = 1;
  int64 volume = 2 [(onekit.http.int64_encoding) = INT64_ENCODING_NUMBER];
}

// BarList wraps a repeated Bar with an unwrap annotation.
message BarList {
  repeated Bar bars = 1 [(onekit.http.unwrap) = true];
}
