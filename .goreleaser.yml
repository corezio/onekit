version: 2

before:
  hooks:
    - go mod download

builds:
  - id: protoc-gen-onekit-go-http
    binary: protoc-gen-onekit-go-http
    main: ./cmd/protoc-gen-onekit-go-http
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: protoc-gen-onekit-go-client
    binary: protoc-gen-onekit-go-client
    main: ./cmd/protoc-gen-onekit-go-client
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: protoc-gen-onekit-ts-client
    binary: protoc-gen-onekit-ts-client
    main: ./cmd/protoc-gen-onekit-ts-client
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: protoc-gen-onekit-ts-server
    binary: protoc-gen-onekit-ts-server
    main: ./cmd/protoc-gen-onekit-ts-server
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: protoc-gen-onekit-py-client
    binary: protoc-gen-onekit-py-client
    main: ./cmd/protoc-gen-onekit-py-client
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

  - id: protoc-gen-onekit-openapiv3
    binary: protoc-gen-onekit-openapiv3
    main: ./cmd/protoc-gen-onekit-openapiv3
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: plugin-archives
    ids:
      - protoc-gen-onekit-go-http
      - protoc-gen-onekit-go-client
      - protoc-gen-onekit-ts-client
      - protoc-gen-onekit-ts-server
      - protoc-gen-onekit-py-client
      - protoc-gen-onekit-openapiv3
    name_template: >-
      onekit_plugins_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^style:"
      - "^Merge pull request"
      - "^Merge branch"
      - "typo"
      - "minor"
      - "cosmetic"

release:
  github:
    owner: 1homsi
    name: onekit
  name_template: "onekit v{{ .Version }}"
  header: |
    ## onekit {{ .Version }}

    This release includes prebuilt protoc plugins for Linux, macOS, and Windows.
  footer: |
    ## Install with Go

    ```bash
    go install github.com/1homsi/onekit/cmd/protoc-gen-onekit-go-http@v{{ .Version }}
    go install github.com/1homsi/onekit/cmd/protoc-gen-onekit-go-client@v{{ .Version }}
    go install github.com/1homsi/onekit/cmd/protoc-gen-onekit-ts-client@v{{ .Version }}
    go install github.com/1homsi/onekit/cmd/protoc-gen-onekit-ts-server@v{{ .Version }}
    go install github.com/1homsi/onekit/cmd/protoc-gen-onekit-py-client@v{{ .Version }}
    go install github.com/1homsi/onekit/cmd/protoc-gen-onekit-openapiv3@v{{ .Version }}
    ```

    Full changelog: https://github.com/1homsi/onekit/compare/{{ .PreviousTag }}...v{{ .Version }}
  prerelease: auto
  draft: false
  replace_existing_draft: true
  target_commitish: "{{ .Commit }}"
