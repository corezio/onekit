version: 2

before:
  hooks:
    - go mod download

builds:
  - id: onek
    binary: onek
    main: ./cmd/onek
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: onek-archive
    ids:
      - onek
    name_template: >-
      onekit_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^style:"
      - "^Merge pull request"
      - "^Merge branch"
      - "typo"
      - "minor"
      - "cosmetic"

release:
  github:
    owner: 1homsi
    name: onekit
  name_template: "onekit v{{ .Version }}"
  header: |
    ## onekit {{ .Version }}

    This release includes prebuilt `onek` CLI binaries for Linux, macOS, and Windows.
  footer: |
    ## Install with Go

    ```bash
    go install github.com/1homsi/onekit/cmd/onek@v{{ .Version }}
    ```

    Full changelog: https://github.com/1homsi/onekit/compare/{{ .PreviousTag }}...v{{ .Version }}
  prerelease: auto
  draft: false
  replace_existing_draft: true
  target_commitish: "{{ .Commit }}"
