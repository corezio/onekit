version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/1homsi/onekit/examples/enum-params/api
    - file_option: go_package_prefix
      module: buf.build/googleapis/googleapis
      value: ""
    - file_option: go_package_prefix
      module: buf.build/bufbuild/protovalidate
      value: ""
    - file_option: go_package_prefix
      module: buf.build/corezio/onekit
      value: ""

plugins:
  - local: protoc-gen-go
    out: ./api
    opt: module=github.com/1homsi/onekit/examples/enum-params/api

  - local: ../../bin/protoc-gen-onekit-go-http
    out: api
    opt:
      - module=github.com/1homsi/onekit/examples/enum-params/api
      - generate_mock=false

  - local: ../../bin/protoc-gen-onekit-go-client
    out: api
    opt:
      - module=github.com/1homsi/onekit/examples/enum-params/api

  - local: ../../bin/protoc-gen-onekit-openapiv3
    out: ./docs
