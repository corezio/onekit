version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/1homsi/onekit/examples/ts-client-demo/api
    - file_option: go_package_prefix
      module: buf.build/googleapis/googleapis
      value: ""
    - file_option: go_package_prefix
      module: buf.build/bufbuild/protovalidate
      value: ""
    - file_option: go_package_prefix
      module: buf.build/corezio/onekit
      value: ""

plugins:
  # Go protobuf types
  - local: protoc-gen-go
    out: ./api
    opt: module=github.com/1homsi/onekit/examples/ts-client-demo/api

  # Go HTTP server handlers
  - local: ../../bin/protoc-gen-onekit-go-http
    out: api
    opt:
      - module=github.com/1homsi/onekit/examples/ts-client-demo/api
      - generate_mock=false

  # TypeScript HTTP client
  - local: ../../bin/protoc-gen-onekit-ts-client
    out: ./client/generated
    opt: paths=source_relative
