# Buf code generation configuration v2
version: v2

# Managed mode - automatically manages go_package options
managed:
  enabled: true
  override:
    # Set default Go package prefix for generated code
    - file_option: go_package_prefix
      value: github.com/1homsi/onekit/examples/market-data-unwrap/api
    # Disable package prefix for Google APIs (use their standard packages)
    - file_option: go_package_prefix
      module: buf.build/googleapis/googleapis
      value: ""
    # Disable package prefix for protovalidate (use their standard packages)
    - file_option: go_package_prefix
      module: buf.build/bufbuild/protovalidate
      value: ""
    # Disable package prefix for onekit (use standard import path)
    - file_option: go_package_prefix
      module: buf.build/corezio/onekit
      value: ""

# Local protoc plugins (installed via make install)
plugins:
  # Standard Go protobuf code generation
  - local: protoc-gen-go
    out: ./api
    opt: module=github.com/1homsi/onekit/examples/market-data-unwrap/api

  # OpenAPI v3 documentation generation in YAML format
  - local: ../../bin/protoc-gen-onekit-openapiv3
    out: ./docs

  # OpenAPI v3 documentation generation in JSON format
  - local: ../../bin/protoc-gen-onekit-openapiv3
    out: ./docs
    opt:
      - format=json

  # HTTP service generation with unwrap support
  - local: ../../bin/protoc-gen-onekit-go-http
    out: api
    opt:
      - module=github.com/1homsi/onekit/examples/market-data-unwrap/api

  # HTTP client generation
  - local: ../../bin/protoc-gen-onekit-go-client
    out: api
    opt:
      - module=github.com/1homsi/onekit/examples/market-data-unwrap/api
